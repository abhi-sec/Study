<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <header class="bg-slate-900 text-white p-4 shadow">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <h1 class="text-xl font-semibold">Study Tracker</h1>
        <button id="openCreateModalBtn" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-md">
          Create Task
        </button>
      </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
      <section id="board" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
        <div class="column bg-white rounded-lg p-3 shadow" data-status="To Do">
          <h2 class="font-semibold mb-3">To Do</h2>
          <div class="task-list space-y-3 min-h-[180px]"></div>
        </div>
        <div class="column bg-white rounded-lg p-3 shadow" data-status="In Progress">
          <h2 class="font-semibold mb-3">In Progress</h2>
          <div class="task-list space-y-3 min-h-[180px]"></div>
        </div>
        <div class="column bg-white rounded-lg p-3 shadow" data-status="Under Review">
          <h2 class="font-semibold mb-3">Under Review</h2>
          <div class="task-list space-y-3 min-h-[180px]"></div>
        </div>
        <div class="column bg-white rounded-lg p-3 shadow" data-status="Completed">
          <h2 class="font-semibold mb-3">Completed</h2>
          <div class="task-list space-y-3 min-h-[180px]"></div>
        </div>
      </section>
    </main>

    <div id="taskModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
      <div class="bg-white rounded-lg p-5 w-full max-w-lg">
        <h3 id="taskModalTitle" class="text-lg font-semibold mb-4">Create Task</h3>
        <form id="taskForm" class="space-y-3">
          <input type="hidden" id="taskId" />
          <div>
            <label class="block text-sm font-medium">Title</label>
            <input id="title" class="w-full border rounded p-2" required />
          </div>
          <div>
            <label class="block text-sm font-medium">Subject</label>
            <input id="subject" class="w-full border rounded p-2" required />
          </div>
          <div>
            <label class="block text-sm font-medium">Description</label>
            <textarea id="description" class="w-full border rounded p-2" rows="3"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium">Priority</label>
              <select id="priority" class="w-full border rounded p-2">
                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium">Status</label>
              <select id="status" class="w-full border rounded p-2">
                <option>To Do</option>
                <option>In Progress</option>
                <option>Under Review</option>
                <option>Completed</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium">Due Date</label>
            <input id="dueDate" type="date" class="w-full border rounded p-2" />
          </div>
          <div class="flex justify-end gap-2 pt-2">
            <button type="button" id="cancelTaskBtn" class="px-4 py-2 rounded border">Cancel</button>
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="deleteModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
      <div class="bg-white rounded-lg p-5 w-full max-w-sm">
        <h3 class="text-lg font-semibold mb-2">Delete Task</h3>
        <p class="text-sm text-slate-600 mb-4">Are you sure you want to delete this task?</p>
        <div class="flex justify-end gap-2">
          <button id="cancelDeleteBtn" class="px-4 py-2 rounded border">Cancel</button>
          <button id="confirmDeleteBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
